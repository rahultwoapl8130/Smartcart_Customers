<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCart | Personalized Recommendations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Background gradient shapes */
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
        }

        .shape-1 {
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #6366f1 0%, transparent 70%);
        }

        .shape-2 {
            bottom: -10%;
            left: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, #ec4899 0%, transparent 70%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background-color 0.3s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            margin-top: 2rem;
        }

        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .hidden {
            display: none !important;
        }

        /* Recommendations Grid */
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s, background 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .product-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .product-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .product-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <main class="container">
        <header>
            <h1>SmartCart</h1>
            <p>Discover products tailored exclusively for you based on our advanced AI analysis.</p>
        </header>

        <section class="form-section glass-panel">
            <h2>Tell us about yourself</h2>
            <form id="recommendation-form">
                <div class="input-group">
                    <label for="income">Estimated Annual Income ($)</label>
                    <input type="number" id="income" name="income" placeholder="e.g. 60000" required>
                </div>
                
                <div class="input-group">
                    <label for="spending">Average Monthly Spending ($)</label>
                    <input type="number" id="spending" name="spending" placeholder="e.g. 500" required>
                </div>
                
                <button type="submit" class="btn-primary">Get My Recommendations</button>
            </form>
        </section>

        <section id="results-section" class="results-section hidden">
            <h2 id="cluster-title">Your Personalized Profile</h2>
            <p id="cluster-description">Based on your inputs, here is what we recommend.</p>
            
            <div class="recommendations-grid" id="recommendations-grid">
                <!-- Products will be injected here via JavaScript -->
            </div>
            
            <button id="reset-btn" class="btn-secondary">Start Over</button>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('recommendation-form');
            const formSection = document.querySelector('.form-section');
            const resultsSection = document.getElementById('results-section');
            const resetBtn = document.getElementById('reset-btn');
            
            const clusterTitle = document.getElementById('cluster-title');
            const clusterDescription = document.getElementById('cluster-description');
            const grid = document.getElementById('recommendations-grid');

            // Define the products for each cluster
            const clusterData = {
                0: {
                    title: "Cluster 0: The Balanced Shopper",
                    desc: "You have moderate income and spending. We recommend our best-value everyday bundles.",
                    products: [
                        { icon: "🥩", name: "Fresh Meat Pack", desc: "Quality cuts for everyday meals." },
                        { icon: "🍷", name: "Table Wine", desc: "Great taste at an affordable price." },
                        { icon: "🛒", name: "Essential Bundle", desc: "Daily household needs." }
                    ]
                },
                1: {
                    title: "Cluster 1: The Premium VIP",
                    desc: "High income, high spending. You appreciate the finer things in life.",
                    products: [
                        { icon: "🍾", name: "Vintage Champagne", desc: "Aged to perfection." },
                        { icon: "✨", name: "Gold Membership", desc: "Exclusive access and rewards." },
                        { icon: "🦞", name: "Gourmet Seafood", desc: "Imported and fresh." }
                    ]
                },
                2: {
                    title: "Cluster 2: The Smart Saver",
                    desc: "Budget-conscious shopper. We have the best deals for you today!",
                    products: [
                        { icon: "🏷️", name: "Mega Discount Bundle", desc: "Save up to 40% on essentials." },
                        { icon: "🍎", name: "Seasonal Fruits", desc: "Fresh and budget-friendly." },
                        { icon: "🍬", name: "Sweet Treats", desc: "Affordable indulgences." }
                    ]
                },
                3: {
                    title: "Cluster 3: The Trendsetter",
                    desc: "Moderate to high income with high spending. Here is what is trending right now.",
                    products: [
                        { icon: "🌟", name: "Trending Wines", desc: "Our most popular selections this month." },
                        { icon: "🎁", name: "Curated Gift Box", desc: "Handpicked premium items." },
                        { icon: "🍫", name: "Imported Chocolates", desc: "Rich and luxurious." }
                    ]
                }
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const income = parseFloat(document.getElementById('income').value);
                const spending = parseFloat(document.getElementById('spending').value);
                
                // Simple heuristic mimicking the KMeans model boundaries
                let clusterId = 0;
                
                if (income > 65000 && spending > 800) {
                    clusterId = 1; // Premium
                } else if (income <= 45000 && spending <= 400) {
                    clusterId = 2; // Budget
                } else if (income > 45000 && spending > 600) {
                    clusterId = 3; // Trendsetter
                } else {
                    clusterId = 0; // Balanced
                }

                displayResults(clusterId);
            });

            function displayResults(clusterId) {
                const data = clusterData[clusterId];
                
                // Update text
                clusterTitle.textContent = data.title;
                clusterDescription.textContent = data.desc;
                
                // Build product cards
                grid.innerHTML = '';
                data.products.forEach((prod, index) => {
                    const card = document.createElement('div');
                    card.className = `product-card`;
                    card.style.animationDelay = `${index * 0.15}s`; // Staggered animation
                    card.innerHTML = `
                        <div class="product-icon">${prod.icon}</div>
                        <h3>${prod.name}</h3>
                        <p>${prod.desc}</p>
                    `;
                    // Add animation class after a tiny delay to ensure it triggers
                    setTimeout(() => card.classList.add('animate-fade-in'), 10);
                    grid.appendChild(card);
                });

                // Hide form, show results
                formSection.classList.add('hidden');
                resultsSection.classList.remove('hidden');
                resultsSection.classList.add('glass-panel', 'animate-fade-in');
            }

            resetBtn.addEventListener('click', () => {
                form.reset();
                resultsSection.classList.add('hidden');
                formSection.classList.remove('hidden');
                formSection.classList.add('animate-fade-in');
            });
        });
    </script>
</body>
</html>
